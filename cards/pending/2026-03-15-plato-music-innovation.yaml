  - front: "Why was Plato so anxious about musical innovators departing from classical forms?"
    back: |
      For Plato, music was the direct expression of a nation's soul. So if musicians start experimenting — adding complexity, breaking apart the unity of rhythm, harmony, and words — the nation's moral character is literally being corrupted. It wasn't aesthetic conservatism; it was a moral emergency.

      <i>"Music is the expression of the soul's emotion; if the soul of the musician be virtuous, his music will be full of nobility and will unite the souls of men with the spirits of heaven."</i>

      The thing to notice is that he saw rhythm and harmony as regulated by the words being sung. When composers began separating these elements — varying the melody independently, adding complex note variations — they were loosening the moral guardrails. For Plato, musical innovation and moral corruption were the same problem seen from two angles.
