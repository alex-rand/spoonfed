  - front: "Why was Plato so anxious about musical innovators departing from classical forms?"
    back: |
      Plato saw music as the direct expression of a nation's soul — *"Music is the expression of the soul of the nation; it is the lair that corruption will creep in, hence all music as a whole will be full of nobility and will lift the souls of men with the spirit of heaven."* So if musicians start experimenting, adding complexity and variation, breaking apart the unity of rhythm, harmony, and words, then the nation's moral character is literally being corrupted.

      That's why he undertook to exterminate the musical innovators. It wasn't aesthetic conservatism — it was a moral emergency. He understood that rhythm and harmony were regulated by the words being sung, and when composers and poets began separating these elements (varying the melody while keeping the same rhythm, or adding new complex note variations that departed from tradition), they were loosening the moral guardrails that held society together.

      See? The thing to notice is that for Plato, musical innovation and moral corruption were not separate problems. They were the same problem, seen from two angles.
