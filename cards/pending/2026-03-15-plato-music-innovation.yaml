  - front: "Why did Plato and Aristotle see the shift from voice-based to instrumental music as morally decadent?"
    back: |
      The classical Greek view was that music's moral power came from the unity of words, rhythm, and harmony — the voice carried meaning, and the instruments served it. When innovators began separating these elements, composing independent instrumental parts and "setting bare words to metre," they were moving toward a more abstract, purely sonic art. For Plato and Aristotle, this abstraction was a kind of moral unravelling.

      The thing to notice is that the corporeal, voice-centred approach kept music grounded in language and therefore in reason. Once you strip away the words and let the instruments do their own thing — complexity for complexity's sake — you lose the ethical content entirely. It becomes, as Plato puts it, just "swiftness and smoothness and a brutish noise."

      <i>"He calls to account the poets who make still further havoc by separating the rhythm and the figure of the dance from the melody, setting bare words to metre, and also separating the rhythm from the words, using the lyre or the flute alone."</i>
