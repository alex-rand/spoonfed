cards:
  - front: "What is the formal name of MN2 in the Pali Canon?"
    back: |
      सब्बासव सुत्त, literally 'the sutta of all the asavas'. Pretty close to contemporary Hindi!

      Where सब्बा = सभी = all. In Hindi maybe we would call it the सभी आसव सूत्र.
