# Example card — very long, structured with bullet lists, includes a mnemonic
tags:
  - MN
  - MN7
cards:
  - front: "List the 16 defilements upakkilesa 随烦恼 from the pali canon, and where along the supramundane path they are each uprooted, according to the classical MN commentaries."
    back: |
      Heads up that bb says he's skeptical of this supposed ordering of elimination of the defilements, given only in the commentaries and never in the suttas themselves. Upandita suyadaw expresses the same skepticism, apparently.

      Anyway:

      <u><b>Path of Stream Entry:</b></u>
      <ul>
      <li><b>Contempt</b> ('devaluation of favours done to you/benefits conferred on you by others'. Like eg looking back on your life and being like 'I did this all by myself', and thinking ill of those who in fact helped you along your way.)</li>
      <li><b>Insolence</b> ('presumption, when you put yourself at the same level as people with higher qualities'. Like maybe you think of a person 'I'm more experienced than he is' even when it's not true, then you look down on that person)</li>
      <li><b>Envy</b> ('resentment over honours, good fortune etc shown to others, or their position, or their wealth. It's the feeling of displeasure or dislike at seeing someone receive something you don't receive / haven't achieved yourself'. Feels related to the 'blemishes' 秽 from MN5?)</li>
      <li><b>Avarice/Miserliness</b> ('unwillingness to share one's possessions with others')</li>
      <li><b>Deceit</b> (when you do something unskillful of action, speech, or thought, then for the purpose of concealing it, form the 'evil wish: may others not find out about this'. And you try to deceive others about your behaviour. Crookedness/concealment.)</li>
      <li><b>Fraud/Craftiness</b> (like an eel who shows only his head to snakes and only his tail to fish, in an effort to seem like their friend, but secretly just wants something from them. Likewise we can sometimes pose as friendly or having a certain posture towards someone, but really we just want something from them.)</li>
      </ul>

      <b>Path of non-returning:</b>
      <ul>
      <li><b>Ill-will</b></li>
      <li><b>Anger</b></li>
      <li><b>Resentment</b> (you get this 'after anger has repeatedly beset the mind'. bb says it's sort of like a stronger version of ill will.)</li>
      <li><b>Negligence/Heedlessness</b> (from the commentary: letting the mind roam among the sensual pleasures. But bb emphasizes it's about losing recognition of the need to uphold good conduct, be diligent, maintain mindfulness in everyday life… letting the mind slip into a defilement and not have the awareness to right the course. From the dhammapada chapter 2: 'heedlessness is the path to death'.)</li>
      </ul>

      <b>Path of Arahantship:</b>
      <ul>
      <li><b>Covetousness + unrighteous greed</b> (greed/lust)</li>
      <li><b>Obstinacy</b> (inflexibility, rigidity, like a bellows full of air)</li>
      <li><b>Rivalry</b> ('attempting to outdo others, surpass their achievements' in the commentaries there's the example of a monk who says 'oh that other monk can meditate for 1 hour, so I'll wait for him to get up and then I'll meditate for 2 hours, so everyone will admire me.)</li>
      <li><b>Conceit</b> (manna. When you consider yourself so great.)</li>
      <li><b>Arrogance/haughtiness</b> (utimanna, like manna, but where the prefix 'uti' means 'excessive'. It's not just about thinking you're so great (conceit), but also about thinking you're better than others, looking down on others).</li>
      <li><b>Vanity.</b> (The Pali word is associated with 'intoxication'. When you're young, you're 'intoxicated' with your youth. When you're healthy, you're 'intoxicated' with your health.)</li>
      </ul>

      Cold icicles eaten are defecated frozen, itchy anus relishes numbness, carrots only reveal cavernous anal vacuums.
