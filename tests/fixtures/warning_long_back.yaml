cards:
  - front: "What is the history of computing?"
    back: "Computing has a long and rich history that spans centuries, from the earliest mechanical calculators invented by Blaise Pascal and Gottfried Wilhelm Leibniz in the 17th century, through Charles Babbage's Analytical Engine in the 19th century, to the electronic computers of the 20th century including ENIAC, UNIVAC, and the personal computer revolution led by companies like Apple and IBM."
